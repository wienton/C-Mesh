<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>C-Mesh Accessor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="ambient-glow"></div>

    <div class="container">

        <!-- Header with Slogan -->
        <header>
            <div class="brand">
                <h1>C-Mesh <span class="accent">Accessor</span></h1>
                <p class="slogan">NO TO RESTRICTIONS // ЗАПРЕТАМ НЕТ</p>
            </div>
            <div class="status-dot" id="statusDot"></div>
        </header>

        <!-- Main Power Toggle -->
        <div class="main-toggle">
            <label class="toggle-switch">
                <input type="checkbox" id="proxyToggle">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                    <span class="toggle-glow"></span>
                </span>
            </label>
            <div class="toggle-labels">
                <span class="label-off">OFF</span>
                <span class="label-on">ON</span>
            </div>
        </div>

        <!-- Status Text -->
        <div class="status-info">
            <span id="statusText">Connection inactive</span>
            <span id="statusSub" class="subtext">Select services below</span>
        </div>

        <!-- Services Section -->
        <div class="services-panel" id="servicesPanel">

            <!-- Universal Mode -->
            <label class="service-row universal">
                <input type="checkbox" id="universalToggle" class="service-input">
                <div class="service-content">
                    <span class="service-title">UNIVERSAL MODE</span>
                    <span class="service-desc">Route all traffic</span>
                </div>
                <div class="service-toggle"></div>
            </label>

            <!-- Service Grid -->
            <div class="services-grid">

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="telegram">
                    <div class="card-inner">
                        <div class="card-icon telegram">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.37-.49 1.02-.75 4.04-1.76 6.74-2.92 8.09-3.48 3.85-1.6 4.64-1.89 5.17-1.9.11 0 .37.03.54.17.14.12.18.28.2.45-.02.07-.02.13-.03.27z" />
                            </svg>
                        </div>
                        <span class="card-label">Telegram</span>
                    </div>
                </label>

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="youtube">
                    <div class="card-inner">
                        <div class="card-icon youtube">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                            </svg>
                        </div>
                        <span class="card-label">YouTube</span>
                    </div>
                </label>

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="discord">
                    <div class="card-inner">
                        <div class="card-icon discord">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
                            </svg>
                        </div>
                        <span class="card-label">Discord</span>
                    </div>
                </label>

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="instagram">
                    <div class="card-inner">
                        <div class="card-icon instagram">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z" />
                            </svg>
                        </div>
                        <span class="card-label">Instagram</span>
                    </div>
                </label>

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="twitter">
                    <div class="card-inner">
                        <div class="card-icon twitter">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                            </svg>
                        </div>
                        <span class="card-label">X / Twitter</span>
                    </div>
                </label>

                <label class="service-card">
                    <input type="checkbox" class="service-input" data-service="netflix">
                    <div class="card-inner">
                        <div class="card-icon netflix">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M4.534 16.843V2.25h3.059l6.743 14.593V2.25h3.059v14.593h-3.06L7.593 2.25v14.593z" />
                            </svg>
                        </div>
                        <span class="card-label">Netflix</span>
                    </div>
                </label>

            </div>
        </div>

        <!-- Footer -->
        <footer>
            <span class="footer-text">v2.1 // SECURE</span>
        </footer>

    </div>

    <script src="popup.js"></script>
</body>

</html>
